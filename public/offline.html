<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — UTEQ Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0d1b3e;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    p {
      color: #93c5fd;
      font-size: 0.95rem;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    #estado {
      font-size: 0.85rem;
      color: #fca5a5;
      margin-bottom: 24px;
    }

    #estado.online {
      color: #86efac;
    }

    button {
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover { background: #2563eb; }
  </style>
</head>
<body>  
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>No hay conexión a Internet. Vuelve a intentarlo cuando estés conectado.</p>

  <div id="estado">● Sin conexión</div>

  <button onclick="location.reload()">Reintentar</button>

  <script>
    function actualizarEstado() {
      const el = document.getElementById('estado');
      if (navigator.onLine) {
        el.textContent = '● Conexión restaurada, recargando...';
        el.classList.add('online');
        setTimeout(() => location.reload(), 1500);
      } else {
        el.textContent = '● Sin conexión';
        el.classList.remove('online');
      }
    }

    window.addEventListener('online',  actualizarEstado);
    window.addEventListener('offline', actualizarEstado);
    actualizarEstado();
  </script>

</body>
</html>
